# =============================================================================
# REGRAS.TOML — motor de regras (limiares genéricos, todos os portos)
# =============================================================================
# CADA NÚMERO NESTE FICHEIRO TEM UMA "fonte". Há três tipos:
#   "APL/Capitania"  -> vem de regulamento/edital público (referenciar qual)
#   "PIANC/prática"  -> regra prática internacional, ponto de partida razoável
#   "PLACEHOLDER"    -> valor inventado como defeito conservador.
#                       TEM DE SER VALIDADO POR UM PILOTO ANTES DE CONFIAR.
#
# Os dados de CATÁLOGO por porto (coordenadas, APL, AIS bbox, profundidade
# de referência do canal) já não vivem aqui — ver portos.toml. Este ficheiro
# guarda só os limiares do motor de regras, partilhados por todos os portos
# (ainda genéricos/PLACEHOLDER, não calibrados por porto — ver Roadmap).
#
# Para afinar a app: edita os números, mantém a fonte atualizada. Mais nada.
# =============================================================================

[ukc]
# Folga sob a quilha mínima como fração do calado (UKC estático simplificado).
# 10% é ponto de partida corrente em águas abrigadas; a barra pode exigir mais
# por squat e resposta vertical à ondulação.
folga_minima_pct = 0.10
folga_ambar_pct = 0.15
# Margem de ondulação: fração da Hs subtraída à folga como aproximação
# empírica (tipo "wave response allowance" do PIANC) da resposta vertical do
# navio à ondulação — não é um cálculo de squat dinâmico real.
margem_ondulacao_frac = 0.3
fonte = "PIANC/prática — validar critério local com piloto"

[estofa]
# Janela informativa em torno da PM/BM para atracação de navios grandes
# (>150 m), referida no doc de análise. NÃO altera o estado do painel — é
# apenas informativo: a estofa DA CORRENTE (que interessa à manobra) não
# coincide necessariamente com a PM/BM do NÍVEL modelado, e o desfasamento
# local (Barra Sul / bacias / cais) não está calibrado nesta app.
janela_min = 45
fonte = "PLACEHOLDER — doc de análise refere ±45 min da estofa para atracação de navios >150 m, por confirmar com piloto/Capitania"

# --- Regras horárias (aplicadas à previsão hora a hora) ----------------------
# Estados: verde (sem restrição), ambar (atenção), vermelho (janela má).
# Cada regra: parametro, limiares ambar/vermelho e, opcionalmente, um setor
# direcional [dir_min, dir_max] em graus (só avalia se a direção cair no setor).

# NOTA: os campos `descricao` estão em INGLÊS porque são mostrados tal-e-qual
# na UI (site em inglês desde a expansão multi-porto). Comentários e campos
# `fonte` continuam em português (proveniência interna).

[[regra]]
id = "swell_oeste"
descricao = "W/SW swell on the approach"
parametro = "swell_altura"
dir_min = 190
dir_max = 300
ambar = 2.5
vermelho = 3.5
fonte = "PLACEHOLDER — to be validated with pilot"

[[regra]]
id = "periodo_longo"
descricao = "Long swell period (heavy groundswell)"
parametro = "swell_periodo"
ambar = 12.0
vermelho = 16.0
fonte = "PLACEHOLDER — to be validated with pilot"

[[regra]]
id = "mar_total"
descricao = "Total significant wave height (combined sea)"
parametro = "onda_altura"
ambar = 3.0
vermelho = 4.5
fonte = "PLACEHOLDER — to be validated with pilot"

[[regra]]
id = "vento"
descricao = "Mean wind at 10 m"
parametro = "vento_kn"
ambar = 25.0
vermelho = 35.0
fonte = "PLACEHOLDER — to be validated with pilot"

[[regra]]
id = "rajada"
descricao = "Wind gusts"
parametro = "rajada_kn"
ambar = 35.0
vermelho = 45.0
fonte = "PLACEHOLDER — to be validated with pilot"

[[regra]]
id = "visibilidade"
descricao = "Horizontal visibility"
parametro = "visibilidade_m"
# Limiar INVERTIDO: mau quando o valor está ABAIXO do limiar (sentido = "abaixo").
sentido = "abaixo"
ambar = 3704.0    # ~2 milhas náuticas
vermelho = 1852.0 # ~1 milha náutica
fonte = "PLACEHOLDER — analysis doc cites 1 NM as the typical threshold for suspending manoeuvres in fog; specific Capitania (Harbour Master) notice article to be confirmed"

[[regra]]
id = "corrente"
descricao = "Current on the approach"
parametro = "corrente_kn"
ambar = 2.0
vermelho = 3.0
# O doc de análise refere 0.5-1.0 nós de popa como limite na fase de
# atracação, mas isso é um critério por berço/manobra que esta app não tem
# dados para avaliar; este limiar é para a corrente geral na aproximação à
# barra (mais permissivo, gate de primeiro nível).
fonte = "PLACEHOLDER — to be validated with pilot"

[[regra]]
id = "embarque_piloto"
descricao = "Pilot boarding (Hs at the boarding area)"
parametro = "onda_altura"
ambar = 2.5
vermelho = 3.0
fonte = "PLACEHOLDER — analysis doc section 5.2: above ~2.5-3 m Hs the pilot boat typically does not operate; first-level gate, to be confirmed"

# --- Regras por tipo de navio -------------------------------------------------
# `tipos`: lista de substrings (case-insensitive) procuradas no campo `tipo`
# do navio (nv_tipoNavio da APL). `parametro`: campo horário avaliado; para
# vento usa-se também a rajada, se disponível, e considera-se o pior dos dois.

[[regra_navio]]
id = "roro_vento"
tipos = ["ro-ro", "roro", "ro/ro"]
parametro = "vento_kn"
vermelho = 20.0
descricao = "APL regulation: RO-RO barred with wind > 20 kn"
fonte = "PLACEHOLDER — citado no doc de análise como regra do Regulamento de Exploração da APL, artigo por confirmar"

[dimensoes]
# Comprimento fora-a-fora (LOA) acima do qual o doc de análise refere que o
# Regulamento da APL exige atracação na estofa da maré. Usado apenas para
# uma nota INFORMATIVA no cartão AIS do navio — NÃO altera estados/cores do
# painel (a manobra em si continua avaliada pelas regras horárias e UKC).
loa_atracacao_estofa = 150.0
fonte = "PLACEHOLDER — citado no doc de análise como regra APL, artigo por confirmar"

[notas_regulamentares]
# Informação qualitativa (não numérica) mostrada no painel, com fonte pública.
# Notas específicas de LISBOA (herdadas da primeira versão do painel);
# mostradas em todos os portos até haver notas por porto — assinaladas como
# tal na primeira linha.
itens = [
  "These qualitative notes refer to the Port of LISBON (original scope of this project); per-port notes are future work.",
  "The Harbour Master may close or restrict the Lisbon bar based on weather and sea conditions, after consulting the Port Authority (CPL notice).",
  "Pilotage is compulsory from outside the bars for vessels in scope; pilot boarding as per the APL Port Authority Regulation.",
  "Tankers carrying dangerous cargo of classes 2, 6 and 8 face specific restrictions (APL Regulation).",
  "Active warnings: VTS-Lisboa, Capitania and ANAVNET (anavnet.hidrografico.pt).",
]
fonte = "Regulamento de Autoridade Portuária da APL + Editais da Capitania do Porto de Lisboa"
