name: Atualizar Janelas da Barra

on:
  schedule:
    - cron: "*/30 * * * *"   # a cada 30 min (UTC); ajustar à vontade
  workflow_dispatch:          # botão manual "Run workflow"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Sem dependências externas: APL via API JSON + Open-Meteo, tudo stdlib.
      - name: Teste offline
        run: python teste_offline.py

      - name: Gerar painel
        env:
          AISSTREAM_KEY: ${{ secrets.AISSTREAM_KEY }}
        run: python janelas_barra.py --horas 72

      - name: Preparar artefacto Pages
        run: mkdir -p _site && cp index.html _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
